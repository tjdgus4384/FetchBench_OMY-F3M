# GraspGen-Mesh-Curobo
name: FetchMeshCuroboGraspGen
prefix: Debug

defaults:
    - FetchMeshCurobo
    - FetchPointCloudBase
    - _self_


viewer:
  camPos: [-2.0, 1.5, 2.5]
  camTar: [0, 0, 0.7]
  enable: True


env:
  numTasks: null
  enableDebugVis: False

solution:

  graspgen:
    host: localhost       # GraspGen ZMQ server host
    port: 5556            # GraspGen ZMQ server port
    num_grasps: 1000
    top_k: 100
    confidence_th: 0.6

  cuRobo:
    ik_rot_th: 0.02
    ik_pos_th: 0.002
    ik_num_seed: 32
    trjopt_num_seed: 16
    graph_num_seed: 4
    motion_gen_timeout: 20
    motion_gen_max_attempts: 10

  move_offset_method: cartesian_linear
  video_freq: 8

  direct_grasp: False
  disable_grasp_obj_ik_collision: True
  disable_grasp_obj_motion_gen: True
